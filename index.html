# 🚀 Panduan Developer: Implementasi Dynamic Form & Dashboard (React JS)

Selamat datang! Dokumen ini dirancang khusus untuk kamu, frontend developer, agar bisa mengintegrasikan sistem Dynamic Form & Dashboard ini ke dalam aplikasi React (Vite) kamu dengan mudah.

Sistem ini menggunakan pendekatan **"Backend-Driven"**, artinya logika utama (tipe field, kalkulasi chart, dll) diatur di Backend. Frontend kamu hanya perlu "bertanya" ke Backend dan merender hasilnya.

---

## 🏗️ Tahap 1: Pengelolaan Form (Form Management)

Tujuannya adalah membuat sebuah halaman di mana user bisa membuat form mereka sendiri.

### Langkah 1: Mengambil Spesifikasi Field dari Backend
Jangan membatasi tipe field (seperti `text`, `dropdown`) di dalam kode React kamu. Tanyakan ke Backend tipe apa saja yang tersedia.

**API:** `GET /api/forms/schema/create-spec`

**Contoh Implementasi:**
```javascript
// Ambil spec saat halaman load
const [fieldTypes, setFieldTypes] = useState([]);

useEffect(() => {
  fetch("http://localhost:4000/api/forms/schema/create-spec")
    .then(res => res.json())
    .then(json => setFieldTypes(json.data.fieldTypes));
}, []);

// Gunakan fieldTypes untuk membuat dropdown "Pilih Tipe Field"
return (
  <select onChange={(e) => setType(e.target.value)}>
    {fieldTypes.map(t => (
      <option key={t.value} value={t.value}>{t.label}</option>
    ))}
  </select>
)
```

### Langkah 2: Konfigurasi Dinamis (Extra Config)
Beberapa tipe field (seperti **Dropdown from API**) butuh input tambahan (URL API, Mapping Label). Backend akan memberitahu kamu jika sebuah field butuh input ekstra melalui properti `extraConfigFields`.

**Logika Frontend:**
```javascript
const currentType = fieldTypes.find(t => t.value === selectedType);

return (
  <>
    {/* Jika tipe ini butuh input ekstra, render secara otomatis */}
    {currentType?.extraConfigFields?.map(cfg => (
      <div key={cfg.key}>
        <label>{cfg.label}</label>
        <input 
          placeholder={cfg.placeholder} 
          onChange={(e) => updateField(cfg.key, e.target.value)} 
        />
      </div>
    ))}
  </>
)
```

---

## 📝 Tahap 2: Mengisi Data (Form Filling)

Setelah form dibuat, user lain akan mengisinya.

### Langkah 1: Merender Form secara Dinamis
Kamu akan menerima objek `formSchema.fields`. Iterasi (looping) array tersebut dan tampilkan input yang sesuai.

**API:** `GET /api/forms/:id?ownerId=...`

**Contoh Pemetaan (Mapping):**
```javascript
{fields.map(field => {
  if (field.type === "string") return <input type="text" ... />
  if (field.type === "number") return <input type="number" ... />
  if (field.type === "dropdown_api") return <MyApiDropdown url={field.apiUrl} ... />
  // ... dan seterusnya
})}
```

### Langkah 2: Mengirim Data (Submission)
Kirim data dalam format JSON. Pastikan kamu mengirim `ownerId` agar data tidak tercampur dengan desa/user lain.

**API:** `POST /api/data`
**Payload:**
```json
{
  "ownerId": "desa-sukamaju",
  "formId": "ID_FORM_KAMU",
  "values": {
    "field_uuid_1": "Nilai Input",
    "field_uuid_2": 150
  },
  "submittedAt": "2023-10-27"
}
```

---

## 📊 Tahap 3: Dashboard & Visualisasi

Ini adalah bagian paling keren. Kamu bisa menampilkan grafik tanpa perlu pusing menghitung rata-rata atau total di Frontend.

### Langkah 1: Mengambil Tipe Visualisasi
Tipe grafik yang tersedia diatur oleh Backend.

**API:** `GET /api/dashboards/viz-types`

### Langkah 2: Live Preview (Logic in BE)
Saat user mengatur grafik di Dashboard Builder, gunakan API Preview agar user bisa melihat hasil grafik secara instan menggunakan data asli.

**API:** `GET /api/dashboards/viz-preview`
**Parameter:** `ownerId`, `formId`, `type`, `xAxis`, `yAxis`, `aggregation`.

**Keuntungan:** Kamu tidak perlu menulis rumus Matematika di React. Cukup kirim parameter, Backend akan membalas dengan data yang sudah siap di-render oleh library grafik (seperti Recharts atau Chart.js).

### Langkah 3: Alur Release (Draft vs Published)
Sistem ini mendukung fitur **Draft**.
1. Simpan perubahan ke draft: `POST /api/dashboards`
2. Setelah oke, release ke publik: `PUT /api/dashboards/:id/release`

---

## 💡 Tips untuk Pemula

1.  **Gunakan ID yang Konsisten**: Backend memberikan `id` (UUID) untuk setiap field. Gunakan ID ini sebagai *key* di state `values` kamu, jangan gunakan Label (karena label bisa berubah).
2.  **Mapping API Dropdown**: Untuk `dropdown_api`, pastikan kamu menggunakan properti `apiLabelField` dan `apiValueField` yang dikonfigurasi user untuk memetakan response JSON dari API eksternal.
3.  **OwnerId adalah Kunci**: Selalu sertakan `ownerId` di setiap request. Ini adalah identitas unik untuk setiap "Tenant" atau "Desa".

---

## 🛠️ API Reference Singkat

| Fitur | Method | Endpoint | Kegunaan |
| :--- | :--- | :--- | :--- |
| **Spec Field** | `GET` | `/api/forms/schema/create-spec` | List tipe field & config-nya |
| **List Form** | `GET` | `/api/forms?ownerId=...` | Mengambil semua form milik user |
| **Simpan Data** | `POST` | `/api/data` | Submit isi form |
| **Spec Grafik** | `GET` | `/api/dashboards/viz-types` | List tipe grafik (Bar, Pie, dll) |
| **Preview Grafik** | `GET` | `/api/dashboards/viz-preview` | Hitung data grafik secara instan |

---

# 📱 Panduan Developer: Implementasi Dynamic Form & Dashboard (React Native)

Selamat datang, Mobile Developer! Dokumen ini membantu kamu membangun aplikasi mobile (Android/iOS) yang bisa menampilkan form dan grafik secara dinamis menggunakan backend kami.

Pendekatan **Backend-Driven** sangat menguntungkan di mobile: Kamu bisa menambahkan tipe form atau grafik baru dari backend tanpa perlu melakukan update aplikasi di PlayStore/AppStore!

---

## 🏗️ Tahap 1: Membangun Form Renderer Dinamis

Di mobile, tugas utama kamu biasanya adalah **mengisi data**.

### Langkah 1: Mengambil Struktur Form
Gunakan API untuk mengambil daftar field yang harus ditampilkan.

**API:** `GET /api/forms/:id?ownerId=...`

### Langkah 2: Merender Input dengan React Native
Kamu tidak bisa menggunakan `<input>` seperti di web. Gunakan komponen dari `react-native`.

**Contoh Mapping Dasar:**
```javascript
import { View, Text, TextInput, Switch } from 'react-native';

const renderField = (field, value, onChange) => {
  switch (field.type) {
    case 'string':
    case 'number':
      return (
        <View key={field.id} style={styles.container}>
          <Text>{field.label}</Text>
          <TextInput
            keyboardType={field.type === 'number' ? 'numeric' : 'default'}
            value={value}
            onChangeText={onChange}
            style={styles.input}
          />
        </View>
      );
    case 'checkbox':
      return (
        <View key={field.id} style={styles.row}>
          <Text>{field.label}</Text>
          <Switch value={value} onValueChange={onChange} />
        </View>
      );
    // Tambahkan case lain: date (DatePicker), image (ImagePicker), dll.
  }
};
```

---

## 📝 Tahap 2: Mengirim Data (Submission)

Kirim data dalam format JSON murni. Pastikan kamu mengirim `ownerId` (misalnya ID Desa yang sedang aktif).

**API:** `POST /api/data`
**Payload:**
```json
{
  "ownerId": "desa-sukamaju",
  "formId": "ID_FORM_DARI_API",
  "values": {
    "field_uuid_1": "Isian Text",
    "field_uuid_2": 250
  },
  "filledBy": {
    "userId": "user-mobile-123",
    "name": "Petugas Lapangan"
  }
}
```

---

## 📊 Tahap 3: Menampilkan Grafik (Dashboard)

Untuk menampilkan grafik di React Native, kami merekomendasikan library seperti **react-native-chart-kit** atau **Victory Native**.

### Langkah 1: Mengambil Data Grafik (Preview)
Kamu tidak perlu menghitung data sendiri. Panggil API Preview untuk mendapatkan data yang sudah "siap saji".

**API:** `GET /api/dashboards/viz-preview`

### Langkah 2: Merender Grafik
Backend akan memberikan data agregat. Kamu tinggal memasukannya ke dalam format yang diminta library grafik kamu.

**Contoh dengan `react-native-chart-kit`:**
```javascript
// Data dari Backend (viz-preview)
const chartData = {
  labels: ["Jan", "Feb", "Mar"],
  datasets: [{ data: [20, 45, 28] }]
};

return (
  <BarChart
    data={chartData}
    width={screenWidth}
    height={220}
    chartConfig={chartConfig}
    verticalLabelRotation={30}
  />
);
```

---

## ⚙️ Tahap 4: Konfigurasi API Dropdown (Penting!)

Jika field bertipe `dropdown_api`, kamu harus melakukan fetch manual ke URL yang diberikan di properti `apiUrl`.

**Logika Mapping Mobile:**
```javascript
const [options, setOptions] = useState([]);

useEffect(() => {
  if (field.type === 'dropdown_api') {
    fetch(field.apiUrl)
      .then(res => res.json())
      .then(data => {
        // Gunakan mapping dinamis dari backend!
        const labelKey = field.apiLabelField || 'label';
        const valueKey = field.apiValueField || 'value';
        
        const mapped = data.map(item => ({
          label: item[labelKey],
          value: item[valueKey]
        }));
        setOptions(mapped);
      });
  }
}, [field]);
```

---

## 💡 Tips untuk Mobile Developer

1.  **Offline Support**: Pertimbangkan untuk menyimpan draf isian di `AsyncStorage` jika petugas lapangan berada di area susah sinyal.
2.  **Validation**: Gunakan `validationRules` dari backend (min, max, pattern) untuk memvalidasi input sebelum dikirim.
3.  **OwnerId Persistence**: Simpan `ownerId` di global state (Redux/Zustand/Context) karena hampir semua API membutuhkannya.

<script>
    function switchTab(tab) {
        // Buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`);
        if (activeBtn) activeBtn.classList.add('active');

        // Content
        document.querySelectorAll('.content-card').forEach(card => card.classList.remove('active'));
        document.getElementById(`${tab}-content`).classList.add('active');
        
        // Render Markdown if not already rendered
        const container = document.getElementById(`${tab}-content`);
        if (container.innerHTML.trim().startsWith('<!--')) {
            const mdSource = document.getElementById(`markdown-${tab}`).innerHTML;
            container.innerHTML = marked.parse(mdSource);
            Prism.highlightAllUnder(container);
        }
    }

    // Initial render
    window.onload = () => {
        switchTab('web');
    };
</script>
